{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-4">
            <h1 class="h2">{{ titulo|default:"Produto" }}</h1>
            <p class="text-muted mb-0">
                Cadastre ou atualize um produto para aparecer no marketplace da FieldReach.
            </p>
        </div>

        <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">
            {% csrf_token %}

            {% include "partials/form_fields.html" %}

            <div class="d-flex gap-2">
                <button class="btn btn-success" type="submit">
                    {{ botao|default:"Salvar produto" }}
                </button>
                <a href="{% if produto %}{% url 'marketplace:detalhe_produto' produto.id %}{% else %}{% url 'marketplace:lista_produtos' %}{% endif %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
