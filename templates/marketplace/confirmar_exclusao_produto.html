{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h1 class="h2">Excluir produto</h1>

        <div class="card p-4">
            <p>
                Tem certeza que deseja excluir <strong>{{ produto.nome }}</strong>?
            </p>

            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    Excluir
                </button>
                <a href="{% url 'marketplace:detalhe_produto' produto.id %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
