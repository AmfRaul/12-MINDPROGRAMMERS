{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-4">
            <h1 class="h2">Avaliar pedido</h1>
            <p class="text-muted mb-0">
                Produto: <strong>{{ pedido.produto.nome }}</strong>
            </p>
        </div>

        <form method="post" class="card p-4 shadow-sm">
            {% csrf_token %}

            {% include "partials/form_fields.html" %}

            <div class="d-flex gap-2">
                <button class="btn btn-success" type="submit">
                    Enviar avaliação
                </button>
                <a href="{% url 'pedidos:meus_pedidos' %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
