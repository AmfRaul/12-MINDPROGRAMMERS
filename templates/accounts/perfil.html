{% extends "base.html" %}

{% block content %}
<h2>Minha conta</h2>

<div class="card p-4">
    <p><strong>Usuário:</strong> {{ user.username }}</p>
    <p><strong>E-mail:</strong> {{ user.email }}</p>
    <p><strong>Tipo de conta:</strong> {{ user.get_tipo_conta_display }}</p>
    <p><strong>Telefone:</strong> {{ user.telefone }}</p>
</div>
{% endblock %}
