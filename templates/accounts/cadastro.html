{% extends "base.html" %}

{% block content %}
<h2>Criar conta</h2>

<p class="text-muted">
    Escolha o tipo de conta de acordo com o seu perfil dentro da FieldReach.
</p>

<form method="post" class="card p-4">
    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-success" type="submit">
        Criar conta
    </button>
</form>

<p class="mt-3">
    Já tem conta?
    <a href="{% url 'login' %}">Entrar</a>
</p>
{% endblock %}
