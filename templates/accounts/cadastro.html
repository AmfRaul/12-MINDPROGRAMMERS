{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h1 class="h2">Criar conta</h1>

        <p class="text-muted">
            Escolha o tipo de conta de acordo com o seu perfil dentro da FieldReach.
        </p>

        <form method="post" class="card p-4 shadow-sm">
            {% csrf_token %}

            {% include "partials/form_fields.html" %}

            <button class="btn btn-success" type="submit">
                Criar conta
            </button>
        </form>

        <p class="mt-3">
            Ja tem conta?
            <a href="{% url 'login' %}">Entrar</a>
        </p>
    </div>
</div>
{% endblock %}
