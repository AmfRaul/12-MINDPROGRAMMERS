{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h1 class="h2">Atualizar pedido</h1>

        <div class="card p-4">
            <p class="mb-1">
                <strong>Produto:</strong> {{ pedido.produto.nome }}
            </p>
            <p class="mb-3">
                <strong>Quantidade:</strong> {{ pedido.quantidade }} {{ pedido.produto.unidade_medida }}
            </p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-flex gap-2">
                    <button class="btn btn-success" type="submit">
                        Salvar status
                    </button>
                    <a href="{% url 'pedidos:meus_pedidos' %}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
